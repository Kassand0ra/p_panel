<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>БЧС Дашборд</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-200 font-sans selection:bg-blue-500/30">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect } = React;

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, errorMsg: '' };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, errorMsg: error.message };
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen flex items-center justify-center bg-slate-950 p-6">
              <div className="max-w-2xl bg-red-900/20 border border-red-500/50 rounded-2xl p-8 text-center">
                <i className="ph-fill ph-warning-circle text-red-500 text-6xl mb-4"></i>
                <h1 className="text-2xl font-bold text-white mb-2">Сталася критична помилка</h1>
                <p className="text-slate-300 mb-6">Панель не змогла обробити файл через непередбачений формат даних. Перезавантажте сторінку та спробуйте інший файл.</p>
                <div className="bg-black/40 p-4 rounded-lg text-left font-mono text-sm text-red-300 overflow-auto">
                  {this.state.errorMsg}
                </div>
                <button 
                  onClick={() => window.location.reload()} 
                  className="mt-6 px-6 py-3 bg-red-600 hover:bg-red-500 text-white font-bold rounded-xl transition-all"
                >
                  Перезавантажити сторінку
                </button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    function App() {
      const [activeTab, setActiveTab] = useState('personnel');
      const [data, setData] = useState([]);
      const [headers, setHeaders] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');
      const [expandedId, setExpandedId] = useState(null);
      const [isAddModalOpen, setIsAddModalOpen] = useState(false);
      const [errorMsg, setErrorMsg] = useState(null);
      const fileInputRef = useRef(null);

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const fileExt = file.name.split('.').pop().toLowerCase();

        if (fileExt === 'xlsx' || fileExt === 'xls') {
          const reader = new FileReader();
          reader.onload = (evt) => {
            try {
              const arrayBuffer = evt.target.result;
              const workbook = XLSX.read(arrayBuffer, { type: 'array' });
              
              if (workbook.SheetNames.length === 0) {
                setErrorMsg("УВАГА: Excel-файл порожній (немає аркушів).");
                return;
              }

              let targetSheetName = workbook.SheetNames.find(name => {
                const n = String(name).toLowerCase();
                return n.includes('загальний') || n.includes('список') || n.includes('заг. список');
              });
              
              if (!targetSheetName) {
                targetSheetName = workbook.SheetNames[0];
                setErrorMsg(`УВАГА: Не знайдено аркуш "Загальний список". Панель завантажила перший доступний аркуш ("${targetSheetName}"). Перевірте, чи вірні дані.`);
              } else {
                setErrorMsg(null);
              }

              const worksheet = workbook.Sheets[targetSheetName];
              const json = XLSX.utils.sheet_to_json(worksheet, { defval: '' });

              if (json.length === 0) {
                setErrorMsg(`УВАГА: Аркуш '${targetSheetName}' порожній.`);
                return;
              }

              const rawHeaders = Object.keys(json[0]);
              const findKey = (keywords) => rawHeaders.find(h => keywords.some(k => String(h).toLowerCase().includes(k)));

              const pibKey = findKey(['піб', 'п.і.б', 'прізвище', 'фio', 'имя']);
              const statusKey = findKey(['статус', 'стан']);
              const zvaniaKey = findKey(['звання', 'звание']);
              const posadaKey = rawHeaders.find(h => String(h).toLowerCase().includes('посада') && !String(h).toLowerCase().includes('id'));
              const callsignKey = findKey(['позивний', 'позывной']);
              const rotaKey = findKey(['рота']);
              const vzvodKey = findKey(['взвод']);
              const locationKey = findKey(['місце перебування', 'місцезнаходження']);

              if (!pibKey) {
                setErrorMsg(prev => (prev ? prev + " " : "") + `УВАГА: На аркуші '${targetSheetName}' не знайдено колонку з ПІБ.`);
              }

              const parsedData = json.map(row => {
                const obj = {};
                for (let key in row) {
                  obj[key] = (row[key] !== undefined && row[key] !== null) ? String(row[key]) : '';
                }
                obj._id = Math.random().toString(36).substr(2, 9);
                
                obj['ПІБ'] = pibKey ? (obj[pibKey] || '') : '';
                obj['СТАТУС'] = statusKey ? (obj[statusKey] || '') : '';
                obj['Звання'] = zvaniaKey ? (obj[zvaniaKey] || '') : '';
                obj['Посада'] = posadaKey ? (obj[posadaKey] || '') : '';
                obj['Позивний'] = callsignKey ? (obj[callsignKey] || '') : '';
                obj['Рота'] = rotaKey ? (obj[rotaKey] || '') : '';
                obj['Взвод'] = vzvodKey ? (obj[vzvodKey] || '') : '';
                obj['Місце перебування'] = locationKey ? (obj[locationKey] || '') : '';
                
                return obj;
              });

              setHeaders(rawHeaders);
              setData(parsedData);
              fileInputRef.current.value = "";

            } catch (error) {
              setErrorMsg("Помилка читання Excel файлу: " + error.message);
            }
          };
          reader.readAsArrayBuffer(file);
        } else {
          setErrorMsg("Будь ласка, завантажуйте оригінальний Excel файл (.xlsx або .xls)");
        }
      };

      const exportExcel = () => {
        if (data.length === 0) return;
        const exportArr = data.map(row => {
            const newRow = {};
            headers.forEach(h => { newRow[h] = row[h] || ''; });
            return newRow;
        });

        const worksheet = XLSX.utils.json_to_sheet(exportArr);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Загальний список");
        XLSX.writeFile(workbook, "Особовий_склад_Оновлено.xlsx");
      };

      const deleteRecord = (id) => {
        if(confirm("Ви впевнені, що хочете видалити цього військовослужбовця?")) {
          setData(data.filter(item => item._id !== id));
        }
      };

      const addRecord = (newRecord) => {
        newRecord._id = Math.random().toString(36).substr(2, 9);
        setData([newRecord, ...data]);
        setIsAddModalOpen(false);
      };

      const copyToClipboard = (pib, callsign, e) => {
        e.stopPropagation();
        let text = pib;
        if (callsign && callsign.trim() !== '' && callsign !== '—') {
            text += ` - ${callsign}`;
        }
        
        const textArea = document.createElement('textarea');
        textArea.value = text;
        textArea.style.position = 'fixed';
        textArea.style.opacity = '0';
        document.body.appendChild(textArea);
        textArea.select();
        try { document.execCommand('copy'); } catch (err) { console.error(err); }
        document.body.removeChild(textArea);
      };

      const filteredData = useMemo(() => {
        if (!searchQuery) return data;
        const query = searchQuery.toLowerCase();
        return data.filter(person => {
          const pib = String(person['ПІБ'] || '').toLowerCase();
          const callsign = String(person['Позивний'] || '').toLowerCase();
          const posada = String(person['Посада'] || '').toLowerCase();
          return pib.includes(query) || callsign.includes(query) || posada.includes(query);
        });
      }, [data, searchQuery]);

      //  статы всех рот и вакансий
      const stats = useMemo(() => {
        const isVacancy = (p) => {
          const name = String(p['ПІБ'] || '').trim().toLowerCase();
          return name === 'вакансія' || name === 'вакансия' || name === '';
        };

        const realPersonnel = data.filter(p => !isVacancy(p));
        const vacanciesCount = data.length - realPersonnel.length;
        const total = realPersonnel.length;
        
        const rotesStats = {
          '1 Рота': 0, '2 Рота': 0, '3 Рота': 0, '4 Рота': 0, 'Рота БпАК': 0, 'Рота УБпАК': 0
        };

        realPersonnel.forEach(p => {
          const r = String(p['Рота'] || '').toLowerCase();
          if (r.includes('1 рота')) rotesStats['1 Рота']++;
          else if (r.includes('2 рота')) rotesStats['2 Рота']++;
          else if (r.includes('3 рота')) rotesStats['3 Рота']++;
          else if (r.includes('4 рота')) rotesStats['4 Рота']++;
          else if (r.includes('убпак') || r.includes('ударних безпілотних')) rotesStats['Рота УБпАК']++;
          else if (r.includes('бпак') || r.includes('безпілотних')) rotesStats['Рота БпАК']++;
        });

        const statuses = {};
        data.forEach(p => {
          const st = String(p['СТАТУС'] || 'Не вказано').trim();
          const displaySt = st === '' ? 'Не вказано' : st;
          statuses[displaySt] = (statuses[displaySt] || 0) + 1;
        });

        const locations = {};
        realPersonnel.forEach(p => {
          const st = String(p['СТАТУС'] || '').toLowerCase();
          if (st.includes('сзч')) return; // игнор СЗЧ

          const rawLoc = String(p['Місце перебування'] || '').trim();
          if (!rawLoc || rawLoc.toLowerCase() === 'не вказано' || rawLoc.toLowerCase().includes('сзч')) return;

          // склейка: 1400 (Гріфіндор) -> Гріфіндор
          let displayLoc = rawLoc.replace(/[0-9()]/g, '').trim();
          if (!displayLoc) displayLoc = rawLoc; // если там цифры

          if (!locations[displayLoc]) locations[displayLoc] = [];
          locations[displayLoc].push(p);
        });

        return { total, vacanciesCount, rotesStats, statuses, locations };
      }, [data]);

      // цвета
      const getStatusColor = (status) => {
        const s = String(status || '').toLowerCase().trim();
        if (s.includes('в строю')) return 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30';
        if (s === 'оп') return 'bg-yellow-500/20 text-yellow-400 border-yellow-500/30';
        if (s.includes('лікування') || s.includes('шпиталь')) return 'bg-blue-500/20 text-blue-400 border-blue-500/30';
        if (s.includes('відпустка')) return 'bg-purple-500/20 text-purple-400 border-purple-500/30';
        if (s.includes('сзч')) return 'bg-red-500/20 text-red-400 border-red-500/30';
        if (s.includes('500')) return 'bg-slate-800 text-slate-400 border-slate-600';
        if (s.includes('200')) return 'bg-black text-slate-300 border-slate-700';
        if (s.includes('відрядження')) return 'bg-[#D4B895]/20 text-[#D4B895] border-[#D4B895]/30'; // бежевий
        if (s.includes('гауптвахта')) return 'bg-[#8B4513]/20 text-[#8B4513] border-[#8B4513]/30'; // коричневий
        if (s.includes('вакансія') || s.includes('вакансия')) return 'bg-slate-700/50 text-slate-400 border-slate-600';
        return 'bg-slate-700 text-slate-300 border-slate-600';
      };

      // дополненная сетка
      const renderExpandedDetails = (person) => (
        <div className="px-6 pb-6 pt-2 border-t border-slate-800/50 bg-slate-900/30">
          <h4 className="text-sm font-medium text-slate-400 mb-4 uppercase tracking-wider">Повна інформація з таблиці</h4>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-6 gap-y-4">
            {headers.map(header => {
              if (header === '_id') return null;
              const value = person[header];
              return (
                <div key={header} className="flex flex-col space-y-1">
                  <span className="text-xs text-slate-500 font-medium">{header}</span>
                  <span className="text-sm text-slate-200 bg-slate-950/50 px-3 py-2 rounded border border-slate-800/60 break-words">
                    {value || <span className="text-slate-600 italic">немаэ даних</span>}
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      );

      return (
        <div className="min-h-screen pb-12">
          <header className="bg-slate-900 border-b border-slate-800 sticky top-0 z-20 shadow-lg">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex flex-col sm:flex-row justify-between items-center h-20 gap-4 sm:gap-0">
                <div className="flex items-center gap-3">
                  <div className="p-2 bg-blue-600/20 rounded-lg border border-blue-500/30">
                    <i className="ph-fill ph-shield-check text-blue-400 text-2xl"></i>
                  </div>
                  <div>
                    <h1 className="text-xl font-bold text-white tracking-tight">Панель Управління Підрозділом</h1>
                    <p className="text-xs text-slate-400 font-medium tracking-wide uppercase">Система обліку особового складу</p>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  <input type="file" accept=".xlsx, .xls" ref={fileInputRef} onChange={handleFileUpload} className="hidden" />
                  {data.length > 0 && (
                    <>
                      <button onClick={() => fileInputRef.current?.click()} className="flex items-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-700 text-sm font-medium rounded-lg border border-slate-700 transition-colors">
                        <i className="ph ph-upload-simple text-blue-400 text-lg"></i> Оновити Excel
                      </button>
                      <button onClick={exportExcel} className="flex items-center gap-2 px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-medium rounded-lg shadow-lg shadow-emerald-900/20 transition-colors">
                        <i className="ph ph-file-xls text-lg"></i> Експорт в Excel
                      </button>
                    </>
                  )}
                </div>
              </div>
            </div>
          </header>

          {errorMsg && (
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-6">
              <div className="bg-red-500/10 border border-red-500/50 rounded-xl p-4 flex items-start gap-3">
                <i className="ph-fill ph-warning-circle text-red-400 text-2xl mt-0.5"></i>
                <div>
                  <h3 className="text-red-400 font-bold mb-1">Увага!</h3>
                  <p className="text-sm text-red-200">{errorMsg}</p>
                </div>
              </div>
            </div>
          )}

          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            {data.length === 0 ? (
              <div className="flex flex-col items-center justify-center py-20 px-4 text-center border-2 border-dashed border-slate-800/80 rounded-3xl bg-slate-900/40 mt-8 shadow-inner">
                <div className="w-24 h-24 bg-emerald-500/10 rounded-full flex items-center justify-center mb-6 border border-emerald-500/20">
                  <i className="ph ph-file-xls text-5xl text-emerald-400"></i>
                </div>
                <h2 className="text-3xl font-bold text-white mb-4">Дані відсутні</h2>
                <p className="text-slate-400 max-w-lg mb-8 text-lg">
                  Завантажте ваш оригінальний <b>Excel-файл (.xlsx)</b>. Панель автоматично знайде вкладку <i>"Загальний список"</i> та завантажить лише необхідні дані.
                </p>
                <button onClick={() => fileInputRef.current?.click()} className="flex items-center gap-3 px-8 py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl shadow-[0_0_30px_-5px_rgba(37,99,235,0.4)] transition-all hover:-translate-y-1">
                  <i className="ph ph-upload-simple text-2xl"></i> Завантажити Excel файл
                </button>
              </div>
            ) : (
              <>
                <div className="flex space-x-1 bg-slate-900/50 p-1 rounded-xl border border-slate-800/60 mb-8 inline-flex overflow-x-auto max-w-full">
                  <button onClick={() => setActiveTab('personnel')} className={`flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 whitespace-nowrap ${activeTab === 'personnel' ? 'bg-slate-800 text-white shadow border border-slate-700' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/50'}`}>
                    <i className="ph ph-users text-lg"></i> Особовий склад
                  </button>
                  <button onClick={() => setActiveTab('summary')} className={`flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 whitespace-nowrap ${activeTab === 'summary' ? 'bg-slate-800 text-white shadow border border-slate-700' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/50'}`}>
                    <i className="ph ph-chart-bar text-lg"></i> Зведена інформація
                  </button>
                  <button onClick={() => setActiveTab('locations')} className={`flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 whitespace-nowrap ${activeTab === 'locations' ? 'bg-slate-800 text-white shadow border border-slate-700' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/50'}`}>
                    <i className="ph ph-map-pin text-lg"></i> Місця перебування
                  </button>
                </div>

                <div className="space-y-6">
                  {/* Вкладка: ОСОБОВИЙ СКЛАД */}
                  {activeTab === 'personnel' && (
                    <div className="space-y-4">
                      <div className="flex flex-col sm:flex-row justify-between gap-4 mb-6">
                        <div className="relative w-full sm:w-96">
                          <i className="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xl"></i>
                          <input type="text" placeholder="Пошук за ПІБ, Позивним або Посадою..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-10 pr-4 py-2.5 bg-slate-900 border border-slate-800 rounded-xl focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none transition-all placeholder:text-slate-600" />
                        </div>
                        <button onClick={() => setIsAddModalOpen(true)} className="flex items-center justify-center gap-2 px-5 py-2.5 bg-emerald-600/10 text-emerald-400 border border-emerald-500/20 hover:bg-emerald-600/20 rounded-xl font-medium transition-all">
                          <i className="ph ph-user-plus text-lg"></i> Додати бійця
                        </button>
                      </div>

                      <div className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-xl">
                        <div className="hidden md:grid grid-cols-12 gap-4 p-4 border-b border-slate-800 bg-slate-900/50 text-xs font-semibold text-slate-400 uppercase tracking-wider">
                          <div className="col-span-3">ПІБ / Позивний</div>
                          <div className="col-span-2">Звання</div>
                          <div className="col-span-3">Посада / Підрозділ</div>
                          <div className="col-span-2">Статус</div>
                          <div className="col-span-2 text-right">Дії</div>
                        </div>

                        <div className="divide-y divide-slate-800 max-h-[70vh] overflow-y-auto">
                          {filteredData.map((person) => {
                            const isExpanded = expandedId === person._id;
                            const isVacancy = String(person['ПІБ'] || '').toLowerCase() === 'вакансія' || !person['ПІБ'];
                            
                            return (
                              <div key={person._id} className={`transition-colors ${isExpanded ? 'bg-slate-800/50' : 'hover:bg-slate-800/30'}`}>
                                <div className="grid grid-cols-1 md:grid-cols-12 gap-2 md:gap-4 p-4 items-center cursor-pointer group" onClick={() => setExpandedId(isExpanded ? null : person._id)}>
                                  <div className="col-span-3 flex flex-col">
                                    <div className="flex items-center gap-2">
                                      <span className={`font-semibold ${isVacancy ? 'text-slate-500 italic' : 'text-slate-200'}`}>
                                        {person['ПІБ'] || 'Вакансія'}
                                      </span>
                                      {!isVacancy && (
                                        <button onClick={(e) => copyToClipboard(person['ПІБ'], person['Позивний'], e)} className="p-1 text-slate-500 hover:text-blue-400 hover:bg-blue-500/10 rounded-md transition-all opacity-0 group-hover:opacity-100" title="Копіювати">
                                          <i className="ph ph-copy text-base"></i>
                                        </button>
                                      )}
                                    </div>
                                    {!isVacancy && <span className="text-sm text-blue-400 font-medium">"{person['Позивний'] || '—'}"</span>}
                                  </div>
                                  <div className="col-span-2 text-sm text-slate-300">
                                    <span className="md:hidden text-slate-500 text-xs mr-2">Звання:</span>
                                    {person['Звання'] || '—'}
                                  </div>
                                  <div className="col-span-3 flex flex-col">
                                    <span className="text-sm font-medium text-slate-300 line-clamp-1">{person['Посада'] || '—'}</span>
                                    <span className="text-xs text-slate-500 line-clamp-1">{person['Рота'] || '—'}</span>
                                  </div>
                                  <div className="col-span-2 flex items-center justify-between md:block mt-2 md:mt-0">
                                    <span className={`inline-flex items-center px-2.5 py-1 rounded-md text-xs font-medium border ${getStatusColor(person['СТАТУС'])}`}>
                                      {person['СТАТУС'] || 'Не вказано'}
                                    </span>
                                    <div className="md:hidden flex items-center gap-3">
                                      <button onClick={(e) => { e.stopPropagation(); deleteRecord(person._id); }} className="p-2 text-slate-500 hover:text-red-400 hover:bg-red-400/10 rounded-lg transition-colors">
                                        <i className="ph ph-trash text-lg"></i>
                                      </button>
                                      <div className="p-1 text-slate-500">
                                        {isExpanded ? <i className="ph ph-caret-up text-lg"></i> : <i className="ph ph-caret-down text-lg"></i>}
                                      </div>
                                    </div>
                                  </div>
                                  <div className="hidden md:flex col-span-2 items-center justify-end gap-3">
                                    <button onClick={(e) => { e.stopPropagation(); deleteRecord(person._id); }} className="p-2 text-slate-500 hover:text-red-400 hover:bg-red-400/10 rounded-lg transition-colors">
                                      <i className="ph ph-trash text-lg"></i>
                                    </button>
                                    <div className="p-1 text-slate-500">
                                      {isExpanded ? <i className="ph ph-caret-up text-lg"></i> : <i className="ph ph-caret-down text-lg"></i>}
                                    </div>
                                  </div>
                                </div>
                                {isExpanded && renderExpandedDetails(person)}
                              </div>
                            );
                          })}
                          {filteredData.length === 0 && (
                            <div className="p-8 text-center text-slate-500">За вашим запитом нікого не знайдено.</div>
                          )}
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Вкладка: ЗВЕДЕНА ІНФОРМАЦІЯ */}
                  {activeTab === 'summary' && (
                    <div className="space-y-6">
                      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                        {/* Загалом */}
                        <div className="col-span-2 md:col-span-2 lg:col-span-1 bg-gradient-to-br from-slate-900 to-slate-800 border border-slate-800 rounded-2xl p-5 shadow-xl relative overflow-hidden">
                          <i className="ph ph-users text-7xl absolute right-2 -bottom-2 opacity-5"></i>
                          <h3 className="text-slate-400 font-medium text-xs mb-1 uppercase tracking-wider">Загальна кількість о/с</h3>
                          <div className="text-4xl font-bold text-white mb-1">{stats.total}</div>
                        </div>
                        
                        {/* Вакансії */}
                        <div className="col-span-2 md:col-span-2 lg:col-span-1 bg-gradient-to-br from-slate-800 to-slate-800 border border-slate-700 rounded-2xl p-5 shadow-xl relative overflow-hidden">
                          <i className="ph ph-user-minus text-7xl absolute right-2 -bottom-2 opacity-5"></i>
                          <h3 className="text-slate-400 font-medium text-xs mb-1 uppercase tracking-wider">Вакансії</h3>
                          <div className="text-4xl font-bold text-slate-300 mb-1">{stats.vacanciesCount}</div>
                        </div>

                        {/* Роти (динамічно) */}
                        {Object.entries(stats.rotesStats).filter(([_, c]) => c > 0).map(([rota, count]) => (
                          <div key={rota} className="bg-gradient-to-br from-blue-900/20 to-slate-800 border border-blue-900/30 rounded-2xl p-5 shadow-xl relative overflow-hidden">
                             <i className="ph ph-shield-check text-blue-400 text-6xl absolute right-2 -bottom-2 opacity-5"></i>
                             <h3 className="text-blue-400 font-medium text-xs mb-1 uppercase tracking-wider">{rota}</h3>
                             <div className="text-3xl font-bold text-white mb-1">{count}</div>
                          </div>
                        ))}
                      </div>

                      <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
                        <h3 className="text-lg font-bold text-white mb-6 flex items-center gap-2">
                          <i className="ph-fill ph-chart-bar text-blue-400 text-xl"></i> Деталізація за Статусом
                        </h3>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                          {Object.entries(stats.statuses).sort((a,b) => b[1] - a[1]).map(([status, count]) => (
                            <div key={status} className={`p-4 rounded-xl border ${getStatusColor(status)} bg-opacity-10`}>
                              <div className="text-sm font-medium mb-1 truncate">{status}</div>
                              <div className="text-2xl font-bold">{count}</div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Вкладка: МІСЦЯ ПЕРЕБУВАННЯ */}
                  {activeTab === 'locations' && (
                    <div className="space-y-6">
                      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">
                        {Object.entries(stats.locations).sort((a,b) => b[1].length - a[1].length).map(([location, people]) => (
                          <div key={location} className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-xl">
                            <div className="bg-slate-800/80 px-4 py-3 border-b border-slate-700 flex justify-between items-center">
                              <h3 className="font-bold text-slate-200 flex items-center gap-2">
                                <i className="ph-fill ph-tent text-amber-500 text-xl"></i>
                                {location}
                              </h3>
                              <span className="bg-slate-950 text-amber-400 text-xs font-bold px-2.5 py-1 rounded-md border border-slate-800">
                                {people.length} чол.
                              </span>
                            </div>
                            <div className="p-0 max-h-96 overflow-y-auto">
                              <table className="w-full text-sm text-left">
                                <thead className="text-xs text-slate-500 bg-slate-900/50 sticky top-0 z-10">
                                  <tr>
                                    <th className="px-4 py-2 font-medium w-1/2">ПІБ / Позивний</th>
                                    <th className="px-4 py-2 font-medium w-5/12">Підрозділ</th>
                                    <th className="px-4 py-2 font-medium w-1/12 text-center">Дії</th>
                                  </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-800/50">
                                  {people.map(p => {
                                    const isLocExpanded = expandedId === p._id;
                                    return (
                                      <React.Fragment key={p._id}>
                                        <tr className="hover:bg-slate-800/30 transition-colors cursor-pointer group" onClick={() => setExpandedId(isLocExpanded ? null : p._id)}>
                                          <td className="px-4 py-3">
                                            <div className="flex items-center gap-2">
                                              <div>
                                                <div className="font-medium text-slate-300">{p['ПІБ']}</div>
                                                <div className="text-xs text-blue-400">"{p['Позивний'] || '—'}"</div>
                                              </div>
                                              <button 
                                                onClick={(e) => copyToClipboard(p['ПІБ'], p['Позивний'], e)}
                                                className="p-1.5 text-slate-500 hover:text-blue-400 hover:bg-blue-500/10 rounded-md transition-all opacity-0 group-hover:opacity-100"
                                                title="Копіювати"
                                              >
                                                <i className="ph ph-copy text-lg"></i>
                                              </button>
                                            </div>
                                          </td>
                                          <td className="px-4 py-3 text-xs text-slate-400 line-clamp-2">
                                            {p['Взвод'] || p['Рота'] || p['Підрозділ'] || '—'}
                                          </td>
                                          <td className="px-4 py-3 text-center text-slate-500">
                                            <i className={`ph ${isLocExpanded ? 'ph-caret-up' : 'ph-caret-down'} text-lg`}></i>
                                          </td>
                                        </tr>
                                        {isLocExpanded && (
                                          <tr>
                                            <td colSpan="3" className="p-0 bg-slate-900/30">
                                              {renderExpandedDetails(p)}
                                            </td>
                                          </tr>
                                        )}
                                      </React.Fragment>
                                    );
                                  })}
                                </tbody>
                              </table>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </>
            )}
          </div>

          {isAddModalOpen && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 overflow-y-auto">
              <div className="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-4xl shadow-2xl my-8">
                <div className="p-6 border-b border-slate-800 flex justify-between items-center sticky top-0 bg-slate-900 rounded-t-2xl z-10">
                  <h2 className="text-xl font-bold text-white flex items-center gap-2">
                    <i className="ph ph-user-plus text-emerald-400 text-xl"></i> Додати військовослужбовця
                  </h2>
                  <button onClick={() => setIsAddModalOpen(false)} className="text-slate-400 hover:text-white transition-colors text-2xl">
                    &times;
                  </button>
                </div>
                
                <form 
                  onSubmit={(e) => {
                    e.preventDefault();
                    const formData = new FormData(e.target);
                    const newRecord = {};
                    headers.forEach(h => {
                      if(h !== '_id') newRecord[h] = formData.get(h) || '';
                    });
                    addRecord(newRecord);
                  }}
                  className="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"
                >
                  {headers.map(header => {
                    if(header === '_id') return null;
                    return (
                      <div key={header} className="flex flex-col gap-1.5">
                        <label className="text-xs font-medium text-slate-400 ml-1">{header}</label>
                        <input name={header} type="text" className="bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-200 focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none transition-all" placeholder={`Введіть ${String(header).toLowerCase()}`} />
                      </div>
                    )
                  })}
                  <div className="col-span-full pt-6 flex justify-end gap-3 border-t border-slate-800 mt-4">
                    <button type="button" onClick={() => setIsAddModalOpen(false)} className="px-5 py-2.5 text-sm font-medium text-slate-300 hover:text-white hover:bg-slate-800 rounded-xl transition-colors">Скасувати</button>
                    <button type="submit" className="px-5 py-2.5 text-sm font-medium text-white bg-emerald-600 hover:bg-emerald-500 rounded-xl shadow-lg shadow-emerald-900/20 transition-all">Зберегти</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
