<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>БЧС Дашборд</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-200 font-sans selection:bg-blue-500/30">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useMemo, useRef, useEffect } = React;

    const hasFirebase = typeof __firebase_config !== 'undefined';
    let fApp, fAuth, fDb, fAppId, fbFuncs;

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, errorMsg: '' };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, errorMsg: error.message };
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen flex items-center justify-center bg-slate-950 p-6">
              <div className="max-w-2xl bg-red-900/20 border border-red-500/50 rounded-2xl p-8 text-center">
                <i className="ph-fill ph-warning-circle text-red-500 text-6xl mb-4"></i>
                <h1 className="text-2xl font-bold text-white mb-2">Сталася критична помилка</h1>
                <p className="text-slate-300 mb-6">Панель не змогла обробити файл. Перезавантажте сторінку.</p>
                <div className="bg-black/40 p-4 rounded-lg text-left font-mono text-sm text-red-300 overflow-auto">
                  {this.state.errorMsg}
                </div>
                <button 
                  onClick={() => window.location.reload()} 
                  className="mt-6 px-6 py-3 bg-red-600 hover:bg-red-500 text-white font-bold rounded-xl transition-all"
                >
                  Перезавантажити сторінку
                </button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    function App() {
      const [activeTab, setActiveTab] = useState('personnel');
      const [data, setData] = useState([]);
      const [headers, setHeaders] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');
      const [expandedId, setExpandedId] = useState(null);
      
      const [isAddModalOpen, setIsAddModalOpen] = useState(false);
      const [isEditModalOpen, setIsEditModalOpen] = useState(false);
      const [formData, setFormData] = useState({});
      
      const [confirmDialog, setConfirmDialog] = useState(null);
      const [errorMsg, setErrorMsg] = useState(null);
      const fileInputRef = useRef(null);

      // Статуси підключення: 'initializing', 'connected', 'local'
      const [dbStatus, setDbStatus] = useState('initializing');
      const [user, setUser] = useState(null);

      // 1. Ініціалізація Хмарної Бази Даних
      useEffect(() => {
        const initFirebase = async () => {
          if (!hasFirebase) {
             setDbStatus('local');
             return;
          }
          try {
             const { initializeApp } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
             const { getAuth, onAuthStateChanged, signInWithCustomToken, signInAnonymously } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
             const { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, writeBatch } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

             fbFuncs = { collection, onSnapshot, doc, setDoc, deleteDoc, writeBatch };

             const firebaseConfig = JSON.parse(__firebase_config);
             fApp = initializeApp(firebaseConfig);
             fAuth = getAuth(fApp);
             fDb = getFirestore(fApp);
             fAppId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

             if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(fAuth, __initial_auth_token);
             } else {
                await signInAnonymously(fAuth);
             }

             onAuthStateChanged(fAuth, (u) => {
                setUser(u);
                if (u) setDbStatus('connected');
             });

          } catch(err) {
             console.error("Firebase init err:", err);
             setDbStatus('local');
          }
        };
        initFirebase();
      }, []);

      // 2. синхра
      useEffect(() => {
         if (dbStatus === 'connected' && user) {
            const metaRef = fbFuncs.doc(fDb, 'artifacts', fAppId, 'public', 'data', 'metadata', 'config');
            const un_meta = fbFuncs.onSnapshot(metaRef, snap => {
                if (snap.exists()) setHeaders(snap.data().headers || []);
            });
            const collRef = fbFuncs.collection(fDb, 'artifacts', fAppId, 'public', 'data', 'personnel');
            const un_coll = fbFuncs.onSnapshot(collRef, snap => {
                const items = [];
                snap.forEach(d => items.push({_id: d.id, ...d.data()}));
                setData(items);
            });
            return () => { un_meta(); un_coll(); };
         } else if (dbStatus === 'local') {
            const savedData = localStorage.getItem('bchs_data');
            const savedHeaders = localStorage.getItem('bchs_headers');
            if (savedData && savedHeaders && savedData !== '[]') {
                setData(JSON.parse(savedData));
                setHeaders(JSON.parse(savedHeaders));
            }
         }
      }, [dbStatus, user]);

      // 3. сохран записей
      const saveNewRecord = async (record) => {
        if (dbStatus === 'connected' && user) {
           await fbFuncs.setDoc(fbFuncs.doc(fDb, 'artifacts', fAppId, 'public', 'data', 'personnel', record._id), record);
        } else {
           const newData = [record, ...data];
           setData(newData);
           localStorage.setItem('bchs_data', JSON.stringify(newData));
        }
      };

      const saveEditedRecord = async (record) => {
        if (dbStatus === 'connected' && user) {
           await fbFuncs.setDoc(fbFuncs.doc(fDb, 'artifacts', fAppId, 'public', 'data', 'personnel', record._id), record);
        } else {
           const newData = data.map(i => i._id === record._id ? record : i);
           setData(newData);
           localStorage.setItem('bchs_data', JSON.stringify(newData));
        }
      };

      const doDeleteRecord = async (id) => {
        if (dbStatus === 'connected' && user) {
           await fbFuncs.deleteDoc(fbFuncs.doc(fDb, 'artifacts', fAppId, 'public', 'data', 'personnel', id));
        } else {
           const newData = data.filter(i => i._id !== id);
           setData(newData);
           localStorage.setItem('bchs_data', JSON.stringify(newData));
        }
      };

      const handleFullUpload = async (newData, newHeaders) => {
        if (dbStatus === 'connected' && user) {
           // батчим
           const batch = fbFuncs.writeBatch(fDb);
           batch.set(fbFuncs.doc(fDb, 'artifacts', fAppId, 'public', 'data', 'metadata', 'config'), { headers: newHeaders });
           newData.forEach(item => {
               batch.set(fbFuncs.doc(fDb, 'artifacts', fAppId, 'public', 'data', 'personnel', item._id), item);
           });
           await batch.commit();
        } else {
           setData(newData);
           setHeaders(newHeaders);
           localStorage.setItem('bchs_data', JSON.stringify(newData));
           localStorage.setItem('bchs_headers', JSON.stringify(newHeaders));
        }
      };

      const performClearAllData = async () => {
         if (dbStatus === 'connected' && user) {
            const batch = fbFuncs.writeBatch(fDb);
            data.forEach(item => {
               batch.delete(fbFuncs.doc(fDb, 'artifacts', fAppId, 'public', 'data', 'personnel', item._id));
            });
            batch.set(fbFuncs.doc(fDb, 'artifacts', fAppId, 'public', 'data', 'metadata', 'config'), { headers: [] });
            await batch.commit();
         } else {
            localStorage.removeItem('bchs_data');
            localStorage.removeItem('bchs_headers');
            setData([]);
            setHeaders([]);
         }
      };

      // помогаем функционалом
      const normalizeRecord = (obj, rawHeaders) => {
        const findKey = (keywords) => {
          let exact = rawHeaders.find(h => keywords.includes(String(h).trim().toLowerCase()));
          if (exact) return exact;
          let partials = rawHeaders.filter(h => keywords.some(k => String(h).toLowerCase().includes(k)));
          if (partials.length > 0) return partials.sort((a, b) => a.length - b.length)[0];
          return undefined;
        };

        const pibKey = findKey(['піб', 'п.і.б', 'прізвище', 'фio', 'имя']);
        const statusKey = findKey(['статус', 'стан']);
        const zvaniaKey = findKey(['звання', 'звание']);
        const posadaKey = rawHeaders.find(h => {
          const lower = String(h).toLowerCase();
          return lower.includes('посада') && !lower.includes('повна') && !lower.includes('id');
        });
        const fullPosadaKey = findKey(['повна посада']);
        const callsignKey = findKey(['позивний', 'позывной']);
        const rotaKey = findKey(['рота']);
        const vzvodKey = findKey(['взвод']);
        const locationKey = findKey(['місце перебування', 'місцезнаходження']);
        const pidrozdilKey = findKey(['підрозділ', 'фактичний підрозділ']);

        obj['ПІБ'] = pibKey ? (obj[pibKey] || '') : '';
        obj['СТАТУС'] = statusKey ? (obj[statusKey] || '') : '';
        obj['Звання'] = zvaniaKey ? (obj[zvaniaKey] || '') : '';
        obj['Посада'] = posadaKey ? (obj[posadaKey] || '') : '';
        obj['Повна посада'] = fullPosadaKey ? (obj[fullPosadaKey] || '') : '';
        obj['Позивний'] = callsignKey ? (obj[callsignKey] || '') : '';
        obj['Рота'] = rotaKey ? (obj[rotaKey] || '') : '';
        obj['Взвод'] = vzvodKey ? (obj[vzvodKey] || '') : '';
        obj['Місце перебування'] = locationKey ? (obj[locationKey] || '') : '';
        obj['Підрозділ'] = pidrozdilKey ? (obj[pidrozdilKey] || '') : '';
        
        return obj;
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const fileExt = file.name.split('.').pop().toLowerCase();
        if (fileExt === 'xlsx' || fileExt === 'xls') {
          const reader = new FileReader();
          reader.onload = async (evt) => {
            try {
              const arrayBuffer = evt.target.result;
              const workbook = XLSX.read(arrayBuffer, { type: 'array' });
              
              if (workbook.SheetNames.length === 0) throw new Error("Excel-файл порожній (немає аркушів).");

              let targetSheetName = workbook.SheetNames.find(name => {
                const n = String(name).toLowerCase();
                return n.includes('загальний') || n.includes('список') || n.includes('заг. список');
              });
              
              if (!targetSheetName) targetSheetName = workbook.SheetNames[0];

              const worksheet = workbook.Sheets[targetSheetName];
              const json = XLSX.utils.sheet_to_json(worksheet, { defval: '' });

              if (json.length === 0) throw new Error(`Аркуш '${targetSheetName}' порожній.`);

              const rawHeaders = Object.keys(json[0]);
              const parsedData = json.map(row => {
                const obj = {};
                for (let key in row) {
                  obj[key] = (row[key] !== undefined && row[key] !== null) ? String(row[key]) : '';
                }
                obj._id = Math.random().toString(36).substr(2, 9);
                return normalizeRecord(obj, rawHeaders);
              });

              await handleFullUpload(parsedData, rawHeaders);
              fileInputRef.current.value = "";
              setErrorMsg(null);
            } catch (error) {
              setErrorMsg("Помилка читання Excel файлу: " + error.message);
            }
          };
          reader.readAsArrayBuffer(file);
        } else {
          setErrorMsg("Будь ласка, завантажуйте оригінальний Excel файл (.xlsx або .xls)");
        }
      };

      const exportExcel = () => {
        if (data.length === 0) return;
        const exportArr = data.map(row => {
            const newRow = {};
            headers.forEach(h => { newRow[h] = row[h] || ''; });
            return newRow;
        });

        const worksheet = XLSX.utils.json_to_sheet(exportArr);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Загальний список");
        XLSX.writeFile(workbook, "Особовий_склад_Оновлено.xlsx");
      };

      const openAddModal = () => {
        const initialForm = {};
        headers.forEach(h => { if(h !== '_id') initialForm[h] = ''; });
        setFormData(initialForm);
        setIsAddModalOpen(true);
      };

      const openEditModal = (person) => {
        setFormData({ ...person });
        setIsEditModalOpen(true);
      };

      const closeModals = () => {
        setIsAddModalOpen(false);
        setIsEditModalOpen(false);
        setFormData({});
      };

      const handleSaveForm = (e) => {
        e.preventDefault();
        const normalized = normalizeRecord({ ...formData }, headers);
        if (isEditModalOpen) {
          saveEditedRecord(normalized);
        } else {
          normalized._id = Math.random().toString(36).substr(2, 9);
          saveNewRecord(normalized);
        }
        closeModals();
      };

      const copyToClipboard = (text, e) => {
        e.stopPropagation();
        const textArea = document.createElement('textarea');
        textArea.value = text;
        textArea.style.position = 'fixed';
        textArea.style.opacity = '0';
        document.body.appendChild(textArea);
        textArea.select();
        try { document.execCommand('copy'); } catch (err) { console.error(err); }
        document.body.removeChild(textArea);
      };

      // фильтры и статы
      const filteredData = useMemo(() => {
        if (!searchQuery) return data;
        const query = searchQuery.toLowerCase();
        return data.filter(person => {
          const pib = String(person['ПІБ'] || '').toLowerCase();
          const callsign = String(person['Позивний'] || '').toLowerCase();
          const posada = String(person['Посада'] || '').toLowerCase();
          return pib.includes(query) || callsign.includes(query) || posada.includes(query);
        });
      }, [data, searchQuery]);

      const stats = useMemo(() => {
        const isVacancy = (p) => {
          const name = String(p['ПІБ'] || '').trim().toLowerCase();
          return name === 'вакансія' || name === 'вакансия' || name === '';
        };

        const realPersonnel = data.filter(p => !isVacancy(p));
        const vacanciesCount = data.length - realPersonnel.length;
        const total = realPersonnel.length;
        
        const rotesStats = {
          '1 Рота': 0, '2 Рота': 0, '3 Рота': 0, '4 Рота': 0, 'Рота БпАК': 0, 'Рота УБпАК': 0
        };

        realPersonnel.forEach(p => {
          const r = (String(p['Рота'] || '') + ' ' + String(p['Підрозділ'] || '')).toLowerCase();
          
          if (r.includes('1 рота')) rotesStats['1 Рота']++;
          else if (r.includes('2 рота')) rotesStats['2 Рота']++;
          else if (r.includes('3 рота')) rotesStats['3 Рота']++;
          else if (r.includes('4 рота')) rotesStats['4 Рота']++;
          else if (r.includes('убпак') || r.includes('ударних безпілотних')) rotesStats['Рота УБпАК']++;
          else if (r.includes('бпак') || r.includes('безпілотних')) rotesStats['Рота БпАК']++;
        });

        const statuses = {};
        data.forEach(p => {
          const st = String(p['СТАТУС'] || 'Не вказано').trim();
          const displaySt = st === '' ? 'Не вказано' : st;
          statuses[displaySt] = (statuses[displaySt] || 0) + 1;
        });

        const locations = {};
        realPersonnel.forEach(p => {
          const st = String(p['СТАТУС'] || '').toLowerCase();
          if (st.includes('сзч')) return;

          const rawLoc = String(p['Місце перебування'] || '').trim();
          if (!rawLoc || rawLoc.toLowerCase() === 'не вказано' || rawLoc.toLowerCase().includes('сзч')) return;

          let displayLoc = rawLoc.replace(/[0-9()]/g, '').trim();
          if (!displayLoc) displayLoc = rawLoc; 

          if (!locations[displayLoc]) locations[displayLoc] = [];
          locations[displayLoc].push(p);
        });

        return { total, vacanciesCount, rotesStats, statuses, locations };
      }, [data]);

      const getStatusColor = (status) => {
        const s = String(status || '').toLowerCase().trim();
        if (s.includes('в строю')) return 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30';
        if (s === 'оп') return 'bg-yellow-500/20 text-yellow-400 border-yellow-500/30';
        if (s.includes('лікування') || s.includes('шпиталь')) return 'bg-blue-500/20 text-blue-400 border-blue-500/30';
        if (s.includes('відпустка')) return 'bg-purple-500/20 text-purple-400 border-purple-500/30';
        if (s.includes('сзч')) return 'bg-red-500/20 text-red-400 border-red-500/30';
        if (s.includes('500')) return 'bg-slate-800 text-slate-400 border-slate-600';
        if (s.includes('200')) return 'bg-black text-slate-300 border-slate-700';
        if (s.includes('відрядження')) return 'bg-[#D4B895]/20 text-[#D4B895] border-[#D4B895]/30'; 
        if (s.includes('гауптвахта')) return 'bg-[#8B4513]/20 text-[#8B4513] border-[#8B4513]/30'; 
        if (s.includes('вакансія') || s.includes('вакансия')) return 'bg-slate-700/50 text-slate-400 border-slate-600';
        return 'bg-slate-700 text-slate-300 border-slate-600';
      };

      const statusHeaderKey = useMemo(() => {
        return headers.find(h => String(h).trim().toLowerCase() === 'статус') || 
               headers.find(h => String(h).toLowerCase().includes('статус'));
      }, [headers]);

      const formHeadersSorted = useMemo(() => {
        if (headers.length === 0) return [];
        const topPriority = ['ПІБ', 'Позивний', 'СТАТУС', 'Звання', 'Посада', 'Повна посада', 'Рота', 'Взвод', 'Місце перебування'];
        const sorted = [];
        topPriority.forEach(p => {
          const match = headers.find(h => String(h).trim().toLowerCase() === p.toLowerCase()) || 
                        headers.find(h => String(h).toLowerCase().includes(p.toLowerCase()));
          if (match && !sorted.includes(match)) sorted.push(match);
        });
        headers.forEach(h => {
          if (h !== '_id' && !sorted.includes(h)) sorted.push(h);
        });
        return sorted;
      }, [headers]);

      return (
        <div className="flex flex-col min-h-screen">
          <header className="bg-slate-900 border-b border-slate-800 sticky top-0 z-20 shadow-lg">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex flex-col sm:flex-row justify-between items-center h-20 gap-4 sm:gap-0">
                <div className="flex items-center gap-3">
                  <div className="p-2 bg-blue-600/20 rounded-lg border border-blue-500/30">
                    <i className="ph-fill ph-shield-check text-blue-400 text-2xl"></i>
                  </div>
                  <div>
                    <h1 className="text-xl font-bold text-white tracking-tight">Панель Управління Підрозділом</h1>
                    <div className="flex items-center gap-2 mt-0.5">
                      {dbStatus === 'connected' ? (
                         <span className="flex items-center gap-1.5 text-[10px] uppercase font-bold tracking-wider bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded-full border border-blue-500/30">
                            <div className="w-1.5 h-1.5 rounded-full bg-blue-400 animate-pulse"></div> Хмарна синхронізація (Real-time)
                         </span>
                      ) : dbStatus === 'local' ? (
                         <span className="flex items-center gap-1.5 text-[10px] uppercase font-bold tracking-wider bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded-full border border-emerald-500/30">
                            <div className="w-1.5 h-1.5 rounded-full bg-emerald-400"></div> Локальний режим
                         </span>
                      ) : (
                         <span className="flex items-center gap-1.5 text-[10px] uppercase font-bold tracking-wider bg-slate-700/50 text-slate-400 px-2 py-0.5 rounded-full">
                            Підключення до бази...
                         </span>
                      )}
                    </div>
                  </div>
                </div>
                <div className="flex items-center gap-3 flex-wrap justify-end">
                  <input type="file" accept=".xlsx, .xls" ref={fileInputRef} onChange={handleFileUpload} className="hidden" />
                  
                  {data.length > 0 && (
                    <>
                      <button onClick={() => setConfirmDialog({
                        text: "Ви впевнені, що хочете видалити всю базу даних? Це вилучить дані з хмари для всіх користувачів!",
                        action: performClearAllData
                      })} className="flex items-center gap-2 px-3 py-2 bg-red-900/30 hover:bg-red-900/50 text-red-400 text-sm font-medium rounded-lg border border-red-900/50 transition-colors" title="Скинути всі дані">
                        <i className="ph ph-trash text-lg"></i> Очистити базу
                      </button>
                      <button onClick={() => fileInputRef.current?.click()} className="flex items-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-700 text-sm font-medium rounded-lg border border-slate-700 transition-colors text-blue-300">
                        <i className="ph ph-upload-simple text-lg"></i> Імпорт з Excel
                      </button>
                      <button onClick={exportExcel} className="flex items-center gap-2 px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-medium rounded-lg shadow-lg shadow-emerald-900/20 transition-colors">
                        <i className="ph ph-file-xls text-lg"></i> Експорт в Excel
                      </button>
                    </>
                  )}
                </div>
              </div>
            </div>
          </header>

          {/* кастомное окно */}
          {confirmDialog && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
              <div className="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-md p-6 shadow-2xl">
                 <div className="flex items-center gap-3 mb-4">
                    <i className="ph-fill ph-warning-circle text-red-500 text-3xl"></i>
                    <h3 className="text-xl font-bold text-white">Підтвердження дії</h3>
                 </div>
                 <p className="text-slate-300 mb-8">{confirmDialog.text}</p>
                 <div className="flex justify-end gap-3">
                    <button onClick={() => setConfirmDialog(null)} className="px-5 py-2.5 bg-slate-800 hover:bg-slate-700 text-white rounded-xl transition-colors font-medium">Скасувати</button>
                    <button onClick={() => { confirmDialog.action(); setConfirmDialog(null); }} className="px-5 py-2.5 bg-red-600 hover:bg-red-500 text-white rounded-xl shadow-lg transition-colors font-bold">Підтвердити</button>
                 </div>
              </div>
            </div>
          )}

          {errorMsg && (
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-6">
              <div className="bg-red-500/10 border border-red-500/50 rounded-xl p-4 flex items-start gap-3">
                <i className="ph-fill ph-warning-circle text-red-400 text-2xl mt-0.5"></i>
                <div className="flex-1">
                  <h3 className="text-red-400 font-bold mb-1">Увага!</h3>
